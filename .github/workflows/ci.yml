name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  go-api:
    name: Go API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go-api/go.mod
      - name: Lint (go vet)
        run: go vet ./...
      - name: Test unit
        run: |
          mkdir -p coverage
          rm -f coverage/unit.out
          set -- $(go list -f '{{if or .TestGoFiles .XTestGoFiles}}{{.ImportPath}}{{end}}' ./... | sed '/^$/d')
          go test -coverprofile=coverage/unit.out "$@"
      - name: Test integration
        run: |
          mkdir -p coverage
          rm -f coverage/integration.out
          set -- $(go list -tags=integration -f '{{if or .TestGoFiles .XTestGoFiles}}{{.ImportPath}}{{end}}' ./... | sed '/^$/d')
          go test -tags=integration -coverprofile=coverage/integration.out "$@"
      - name: Merge coverage
        run: |
          ../scripts/merge-go-coverprofiles.sh coverage.txt coverage/unit.out coverage/integration.out
          go tool cover -func=coverage.txt
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: go-api/coverage.txt
      - name: Build
        run: go build ./cmd/server

  py-ai-api:
    name: Python AI API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: py-ai-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint (compile check)
        run: python -m compileall py_ai_api
      - name: Test unit
        run: |
          rm -f .coverage
          pytest -m unit --cov=py_ai_api --cov-branch --cov-report=
      - name: Test integration
        run: pytest -m integration --cov=py_ai_api --cov-branch --cov-append --cov-report=term-missing --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: py-ai-api/coverage.xml
      - name: Build package
        run: python -m pip wheel . --no-deps --wheel-dir /tmp/wheels

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  docker-images:
    name: Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Go API image
        run: docker build -t legal-doc-intel/go-api:ci ./go-api
      - name: Build Python AI API image
        run: docker build -t legal-doc-intel/py-ai-api:ci ./py-ai-api
      - name: Build frontend image
        run: docker build -t legal-doc-intel/frontend:ci ./frontend
