name: ${COMPOSE_PROJECT_NAME:-legal-doc-intel}

services:
  frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 3000 --strictPort"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - go-api

  go-api:
    build:
      context: ./go-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_PING_TIMEOUT: ${DATABASE_PING_TIMEOUT:-5s}
      GO_API_PORT: ${GO_API_PORT:-8080}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      INTERNAL_AI_BASE_URL: ${INTERNAL_AI_BASE_URL:-http://py-ai-api:8000}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-/samples/storage}
      AZURE_STORAGE_ACCOUNT: ${AZURE_STORAGE_ACCOUNT:-}
      AZURE_BLOB_CONTAINER: ${AZURE_BLOB_CONTAINER:-}
    ports:
      - "${GO_API_PORT:-8080}:8080"
    volumes:
      - ./samples:/samples
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      py-ai-api:
        condition: service_started

  py-ai-api:
    build:
      context: ./py-ai-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE}
      QDRANT_DISTANCE: ${QDRANT_DISTANCE}
      QDRANT_STARTUP_CHECK_ENABLED: ${QDRANT_STARTUP_CHECK_ENABLED}
    ports:
      - "${PY_AI_API_PORT:-8000}:8000"
    volumes:
      - ./samples:/samples
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-legal_doc_intel}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-legal_doc_intel}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:8.6.2-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  postgres18_data:
  qdrant_data:
  redis_data:
  frontend_node_modules:
