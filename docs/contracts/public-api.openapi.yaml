openapi: 3.1.0
info:
  title: Legal Document Intelligence Public API
  version: 1.0.0
  description: Client-facing API served by the Go Main API.
servers:
  - url: http://localhost:8080
    description: Local development
security:
  - bearerAuth: []
paths:
  /api/v1/documents:
    post:
      summary: Upload a document for ingestion
      operationId: createDocument
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '201':
          description: Document accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '422':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
    get:
      summary: List documents
      operationId: listDocuments
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/DocumentStatus'
        - in: query
          name: source_type
          schema:
            type: string
            enum: [repository, upload, api]
        - in: query
          name: tag
          description: Repeat to filter by one or more tags. Matches documents that have any provided tag.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Paged list of documents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /api/v1/documents/{document_id}:
    get:
      summary: Get document details
      operationId: getDocument
      parameters:
        - in: path
          name: document_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /api/v1/guidelines/clause-presence:
    post:
      summary: Start missing-clause check
      operationId: startClausePresenceCheck
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClauseCheckRequest'
      responses:
        '202':
          description: Check accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckAcceptedResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '422':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /api/v1/guidelines/company-name:
    post:
      summary: Start company-name check
      operationId: startCompanyNameCheck
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyNameCheckRequest'
      responses:
        '202':
          description: Check accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckAcceptedResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '422':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /api/v1/guidelines/{check_id}:
    get:
      summary: Get check run status
      operationId: getCheckRun
      parameters:
        - in: path
          name: check_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Check run state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckRunResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /api/v1/guidelines/{check_id}/results:
    get:
      summary: Get check run results
      operationId: getCheckResults
      parameters:
        - in: path
          name: check_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Check results with evidence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckResultsResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          description: Results not available yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      schema:
        type: string
        minLength: 8
        maxLength: 128
      description: Prevents duplicate command execution for retried client requests.

  responses:
    ErrorResponse:
      description: Standard error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, retriable]
          properties:
            code:
              type: string
              examples: [invalid_argument, unauthorized, dependency_unavailable]
            message:
              type: string
            retriable:
              type: boolean
            details:
              type: object
              additionalProperties: true

    DocumentStatus:
      type: string
      enum: [ingested, processing, indexed, failed]

    CheckRunStatus:
      type: string
      enum: [queued, running, completed, failed]

    CheckType:
      type: string
      enum: [clause_presence, company_name]

    CreateDocumentRequest:
      type: object
      required: [filename, mime_type, content_base64]
      properties:
        source_type:
          type: string
          enum: [repository, upload, api]
          default: upload
        source_ref:
          type: string
        tags:
          type: array
          items:
            type: string
        filename:
          type: string
        mime_type:
          type: string
          enum: [application/pdf, image/jpeg, image/png, application/vnd.openxmlformats-officedocument.wordprocessingml.document]
        content_base64:
          type: string
          description: Raw file content encoded as base64.
        tags:
          type: array
          items:
            type: string

    DocumentResponse:
      type: object
      required: [id, filename, mime_type, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        source_type:
          type: string
        source_ref:
          type: string
        filename:
          type: string
        mime_type:
          type: string
        status:
          $ref: '#/components/schemas/DocumentStatus'
        checksum:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DocumentListResponse:
      type: object
      required: [items, limit, offset, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DocumentResponse'
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer

    ClauseCheckRequest:
      type: object
      required: [required_clause_text]
      properties:
        document_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Optional. If omitted, backend applies default scope/filter.
        required_clause_text:
          type: string
          minLength: 5
        context_hint:
          type: string

    CompanyNameCheckRequest:
      type: object
      required: [old_company_name]
      properties:
        document_ids:
          type: array
          items:
            type: string
            format: uuid
        old_company_name:
          type: string
          minLength: 2
        new_company_name:
          type: string

    CheckAcceptedResponse:
      type: object
      required: [check_id, status, check_type]
      properties:
        check_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/CheckRunStatus'
        check_type:
          $ref: '#/components/schemas/CheckType'

    CheckRunResponse:
      type: object
      required: [check_id, status, check_type, requested_at]
      properties:
        check_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/CheckRunStatus'
        check_type:
          $ref: '#/components/schemas/CheckType'
        requested_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        failure_reason:
          type: string

    EvidenceSnippet:
      type: object
      required: [snippet_text, page_number]
      properties:
        snippet_text:
          type: string
        page_number:
          type: integer
          minimum: 1
        chunk_id:
          type: string
        score:
          type: number
          format: float

    CheckResultItem:
      type: object
      required: [document_id, outcome, confidence]
      properties:
        document_id:
          type: string
          format: uuid
        outcome:
          type: string
          enum: [match, missing, review]
        confidence:
          type: number
          minimum: 0
          maximum: 1
        summary:
          type: string
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceSnippet'

    CheckResultsResponse:
      type: object
      required: [check_id, status, items]
      properties:
        check_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/CheckRunStatus'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CheckResultItem'
